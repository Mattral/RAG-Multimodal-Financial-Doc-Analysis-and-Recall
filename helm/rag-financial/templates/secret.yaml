apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rag-financial.fullname" . }}-secrets
  labels:
    {{- include "rag-financial.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ACTIVELOOP_TOKEN: {{ .Values.secrets.activeloopToken | quote }}
  RAG_API_MASTER_KEY: {{ .Values.secrets.ragApiMasterKey | quote }}
  {{- if .Values.secrets.cohereApiKey }}
  COHERE_API_KEY: {{ .Values.secrets.cohereApiKey | quote }}
  {{- end }}
