replicaCount: 2

image:
  repository: rag-financial-multimodal
  tag: "2.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  metricsPort: 8001

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: rag-financial.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# ── Graceful shutdown / zero-downtime rolling deploys ─────────────────────────
# terminationGracePeriodSeconds must exceed preStopSleepSeconds plus the
# app's drain timeout (OBSERVABILITY_CONFIG__SHUTDOWN_DRAIN_TIMEOUT_SECONDS,
# default 30s in config.py) or Kubernetes will SIGKILL before draining
# finishes.
terminationGracePeriodSeconds: 45
preStopSleepSeconds: 10

# ── Topology spread: avoid all replicas landing on one zone/node ─────────────
# labelSelector is derived automatically from the chart's selector labels —
# only specify maxSkew/topologyKey/whenUnsatisfiable here. Set to [] to
# disable if your cluster has too few nodes/zones to satisfy this.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

persistence:
  data:
    enabled: true
    size: 20Gi
  audit:
    enabled: true
    size: 5Gi

redis:
  enabled: true
  auth:
    enabled: false
  master:
    resources:
      requests:
        memory: 256Mi

config:
  environment: production
  logLevel: INFO
  vectorStoreProvider: deeplake
  multiTenancyEnabled: "true"

secrets:
  openaiApiKey: ""
  activeloopToken: ""
  ragApiMasterKey: "change-me"

serviceMonitor:
  enabled: false
  interval: 15s

podDisruptionBudget:
  enabled: true
  minAvailable: 1
