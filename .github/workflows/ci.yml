name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install ruff mypy black isort pydantic pydantic-settings structlog

      - name: Ruff lint
        run: ruff check src/ tests/ evals/

      - name: Black format check
        run: black --check src/ tests/ evals/

      - name: isort check
        run: isort --check-only src/ tests/ evals/

      - name: mypy type check
        run: mypy src/rag_system/config.py src/rag_system/components/base.py
        continue-on-error: true  # warn but don't block

  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test deps
        run: |
          pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-timeout \
            pydantic pydantic-settings structlog httpx numpy \
            hypothesis pypdf fastapi python-multipart qdrant-client

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --cov=src/rag_system \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70
        env:
          ENVIRONMENT: testing

      - name: Run integration tests
        run: pytest tests/integration/ -v --timeout=30
        env:
          ENVIRONMENT: testing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: table
          exit-code: "0"   # warn only — set to 1 to block on CRITICAL
          severity: CRITICAL,HIGH

      - name: Grype vulnerability scan
        uses: anchore/scan-action@v4
        id: grype
        with:
          path: "."
          fail-build: false   # warn only — flip to true once findings are triaged
          severity-cutoff: critical

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Semgrep static analysis
        uses: semgrep/semgrep-action@v1
        continue-on-error: true   # warn only — flip off once findings are triaged
        with:
          config: >-
            p/python
            p/security-audit
            p/secrets

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt || true

  # ─────────────────────────────────────────────────────────────────────────
  eval-regression:
    name: Eval Regression Gate
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install pydantic pydantic-settings structlog httpx numpy

      - name: Run eval regression check
        run: python -m evals.run_evals --fail-on-regression --output evals/ci_report.json
        env:
          ENVIRONMENT: testing
          VECTOR_STORE_CONFIG__PROVIDER: memory
        continue-on-error: true  # soft gate until golden dataset is populated

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/ci_report.json
        if: always()

  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=git-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime

  # ─────────────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - uses: azure/setup-kubectl@v4

      - name: Helm lint
        run: helm lint helm/rag-financial/

      - name: Helm template + kubeconform validate
        run: |
          helm template rag-financial helm/rag-financial/ --debug > /tmp/helm-rendered.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/helm-rendered.yaml

      - name: kubeconform validate k8s/base manifests
        run: |
          kubectl kustomize k8s/base/ > /tmp/k8s-base-rendered.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/k8s-base-rendered.yaml
