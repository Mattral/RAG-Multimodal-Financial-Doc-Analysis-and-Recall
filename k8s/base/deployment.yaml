apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-financial
  labels:
    app: rag-financial
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-financial
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rag-financial
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rag-financial
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: rag-api
          image: rag-financial-multimodal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: metrics
          envFrom:
            - secretRef:
                name: rag-financial-secrets
            - configMapRef:
                name: rag-financial-config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: audit-logs
              mountPath: /app/audit_logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rag-financial-data
        - name: audit-logs
          persistentVolumeClaim:
            claimName: rag-financial-audit
