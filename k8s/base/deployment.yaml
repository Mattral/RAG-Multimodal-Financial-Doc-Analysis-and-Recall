apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-financial
  labels:
    app: rag-financial
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-financial
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rag-financial
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rag-financial
      # Grace period must exceed: preStop sleep + app drain timeout
      # (preStop sleep gives kube-proxy/Service/Ingress time to deregister
      # this pod's endpoint BEFORE SIGTERM is sent, so no new traffic
      # arrives mid-shutdown; the drain timeout then lets in-flight
      # requests finish). Keep in sync with
      # OBSERVABILITY_CONFIG__SHUTDOWN_DRAIN_TIMEOUT_SECONDS (default 30s).
      terminationGracePeriodSeconds: 45
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: rag-financial
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: rag-financial
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: rag-api
          image: rag-financial-multimodal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: metrics
          envFrom:
            - secretRef:
                name: rag-financial-secrets
            - configMapRef:
                name: rag-financial-config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          lifecycle:
            preStop:
              exec:
                # Sleep before the SIGTERM that uvicorn's lifespan shutdown
                # handler reacts to. This window lets the Service endpoint
                # controller and any Ingress/load balancer remove this pod
                # from rotation BEFORE we stop accepting work, eliminating
                # the race where traffic is still sent to a pod that has
                # already begun shutting down.
                command: ["/bin/sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: audit-logs
              mountPath: /app/audit_logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rag-financial-data
        - name: audit-logs
          persistentVolumeClaim:
            claimName: rag-financial-audit
