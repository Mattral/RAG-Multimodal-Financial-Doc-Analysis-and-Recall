global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: rag-financial-multimodal
    environment: local

rule_files:
  - "alerting/slo-burn-rate.yml"
  # Note: this path is relative to /etc/prometheus/ inside the container,
  # which is where docker-compose.yml mounts ./scripts/prometheus.yml and
  # ./scripts/alerting/. If running Prometheus directly (not via compose),
  # point this at the absolute path to scripts/alerting/slo-burn-rate.yml.

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: rag-financial-api
    static_configs:
      - targets: ['rag-api:8001']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
